<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELECTRO-PRO | E-Commerce Professionnel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<style>
:root {
    --primary: #FF6B00;
    --primary-dark: #cc5500;
    --bg-deep: #0a0a0a;
    --dark-2: #141414;
    --dark-3: #1f1f1f;
    --text-main: #FFFFFF;
    --text-dim: #888888;
    --border: rgba(255,255,255,0.08);
    --green: #00e676;
    --red: #ff3b3b;
    --radius: 16px;
    --transition: all 0.3s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }

/* ===== HEADER ===== */
header {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); padding: 15px 20px;
    display: flex; justify-content: space-between; align-items: center;
}
.logo { font-family: 'Clash Display', sans-serif; font-size: 1.5rem; color: var(--primary); font-weight: 700; }
.header-actions { display: flex; gap: 20px; align-items: center; }
.icon-btn { position: relative; cursor: pointer; font-size: 1.3rem; transition: var(--transition); }
.icon-btn:hover { color: var(--primary); }
.cart-badge {
    position: absolute; top: -8px; right: -10px; background: var(--primary);
    color: white; font-size: 0.7rem; font-weight: bold; width: 18px; height: 18px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
}

/* ===== AUTH OVERLAY (INSCRIPTION & CONNEXION) ===== */
#authOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000;
    display: none; align-items: center; justify-content: center; padding: 20px;
}
.auth-card {
    background: var(--dark-2); border: 1px solid var(--border);
    padding: 30px; border-radius: var(--radius); width: 100%; max-width: 450px;
    max-height: 90vh; overflow-y: auto;
}
.auth-tabs { display: flex; gap: 20px; margin-bottom: 25px; border-bottom: 1px solid var(--border); }
.auth-tab { padding: 10px 0; cursor: pointer; color: var(--text-dim); font-weight: 600; position: relative; }
.auth-tab.active { color: var(--primary); }
.auth-tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary); }

/* ===== FORM STYLES ===== */
.form-group { margin-bottom: 15px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.form-group label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-control {
    width: 100%; padding: 12px; background: var(--dark-3); border: 1px solid var(--border);
    border-radius: 10px; color: white; outline: none; transition: var(--transition);
}
.form-control:focus { border-color: var(--primary); }
.btn-auth {
    width: 100%; padding: 15px; background: var(--primary); border: none;
    color: white; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer;
}

/* ===== UI COMPONENTS ===== */
.container { max-width: 1200px; margin: 80px auto 20px; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
.card { background: var(--dark-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.card img { width: 100%; height: 200px; object-fit: contain; background: #fff; border-radius: 12px; margin-bottom: 15px; }

/* Rest of the styles from previous interaction */
</style>
</head>
<body>

<header>
    <div class="logo">ELECTRO-PRO</div>
    <div class="header-actions">
        <div class="icon-btn" onclick="openAuth()">
            <i class="fas fa-user-circle"></i>
            <span id="userStatus" style="font-size: 0.7rem; display: block; color: var(--text-dim);">Déconnecté</span>
        </div>
        <div class="icon-btn" onclick="toggleSidebar('cartSidebar')">
            <i class="fas fa-shopping-cart"></i>
            <div class="cart-badge" id="cartCount">0</div>
        </div>
    </div>
</header>

<div class="container">
    <h2 style="margin-bottom:20px; font-family:'Clash Display'">Nos Produits</h2>
    <div class="grid" id="productGrid">
        </div>
</div>

<div id="authOverlay">
    <div class="auth-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="authTitle" style="font-family:'Clash Display'">Connexion</h2>
            <i class="fas fa-times" style="cursor:pointer" onclick="closeAuth()"></i>
        </div>
        
        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">Se connecter</div>
            <div class="auth-tab" id="tabRegister" onclick="switchAuth('register')">S'inscrire</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPass" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-auth">Accéder au catalogue</button>
        </form>

        <form id="registerForm" style="display:none;">
            <div class="form-row">
                <div class="form-group">
                    <label>Nom</label>
                    <input type="text" id="regNom" class="form-control" placeholder="Doe" required>
                </div>
                <div class="form-group">
                    <label>Prénom</label>
                    <input type="text" id="regPrenom" class="form-control" placeholder="John" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" class="form-control" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" id="regTel" class="form-control" placeholder="+229 XX XX XX XX" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Ville</label>
                    <input type="text" id="regVille" class="form-control" placeholder="Cotonou" required>
                </div>
                <div class="form-group">
                    <label>Rue / Quartier</label>
                    <input type="text" id="regRue" class="form-control" placeholder="Cadjehoun">
                </div>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="regPass" class="form-control" placeholder="Minimum 8 caractères" required>
            </div>
            <button type="submit" class="btn-auth">Créer mon compte Client</button>
        </form>
    </div>
</div>

<script>
// Initialisation Appwrite
const { Client, Account, ID, Databases } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('TON_PROJECT_ID');
const account = new Account(client);
const databases = new Databases(client);

// Gestion de l'affichage Auth
function openAuth() { document.getElementById('authOverlay').style.display = 'flex'; }
function closeAuth() { document.getElementById('authOverlay').style.display = 'none'; }

function switchAuth(type) {
    const isLogin = type === 'login';
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    document.getElementById('authTitle').innerText = isLogin ? 'Connexion' : 'Inscription Client';
}

// LOGIQUE INSCRIPTION (Respect du MCD)
document.getElementById('registerForm').onsubmit = async (e) => {
    e.preventDefault();
    const data = {
        nom: document.getElementById('regNom').value,
        prenom: document.getElementById('regPrenom').value,
        email: document.getElementById('regEmail').value,
        tel: document.getElementById('regTel').value,
        ville: document.getElementById('regVille').value,
        rue: document.getElementById('regRue').value,
        pass: document.getElementById('regPass').value
    };

    try {
        // 1. Création du compte Auth Appwrite
        await account.create(ID.unique(), data.email, data.pass, `${data.prenom} ${data.nom}`);
        
        // 2. Connexion immédiate
        await account.createEmailSession(data.email, data.pass);
        
        // 3. Enregistrement dans la collection 'CLIENT' du MCD
        // Note: Remplace 'COLLECTION_CLIENT_ID' par l'ID réel dans Appwrite
        await databases.createDocument('DATABASE_ID', 'COLLECTION_CLIENT_ID', ID.unique(), {
            nom: data.nom,
            prenom: data.prenom,
            email: data.email,
            telephone: data.tel,
            ville: data.ville,
            adresseRue: data.rue,
            dateInscription: new Date().toISOString(),
            statut: 'actif'
        });

        alert("Compte créé avec succès ! Bienvenue chez ELECTRO-PRO.");
        location.reload();
    } catch (error) {
        alert("Erreur: " + error.message);
    }
};

// LOGIQUE CONNEXION
document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;

    try {
        await account.createEmailSession(email, pass);
        closeAuth();
        checkUser();
    } catch (error) {
        alert("Identifiants incorrects.");
    }
};

async function checkUser() {
    try {
        const user = await account.get();
        document.getElementById('userStatus').innerText = user.name;
        document.getElementById('userStatus').style.color = 'var(--green)';
    } catch (err) {
        document.getElementById('userStatus').innerText = "Déconnecté";
    }
}

// Simulation produits au chargement
window.onload = () => {
    checkUser();
    const mockProducts = [
        { id: '1', nom: 'Split Inverter 1.5 CV', marque: 'LG', prix: 350000, img: 'https://images.unsplash.com/photo-1658213645070-50346387d833?auto=format&fit=crop&q=80&w=400' },
        { id: '2', nom: 'Réfrigérateur Side by Side', marque: 'Samsung', prix: 850000, img: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&q=80&w=400' }
    ];
    const grid = document.getElementById('productGrid');
    grid.innerHTML = mockProducts.map(p => `
        <div class="card">
            <img src="${p.img}" alt="${p.nom}">
            <p style="color:var(--text-dim); font-size:0.8rem">${p.marque}</p>
            <h3 style="margin:5px 0">${p.nom}</h3>
            <p style="color:var(--primary); font-weight:bold; font-size:1.2rem">${p.prix.toLocaleString()} FCFA</p>
            <button class="btn-auth" style="margin-top:15px; background:rgba(255,107,0,0.1); color:var(--primary); border:1px solid var(--primary)">Ajouter au panier</button>
        </div>
    `).join('');
};
</script>

</body>
</html>
