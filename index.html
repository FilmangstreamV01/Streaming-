<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELECTRO-GOLD | Excellence Électroménager</title>
    
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<style>
:root {
    --accent: #EAB308;
    --bg: #050505;
    --card: #0F0F0F;
    --glass: rgba(255, 255, 255, 0.03);
    --border: rgba(255, 255, 255, 0.08);
    --text: #F8FAFC;
    --text-dim: #94A3B8;
    --radius-lg: 24px;
    --radius-md: 12px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

/* === NAVIGATION & SEARCH === */
nav {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 1rem 5%; display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.logo { font-family: 'Clash Display'; font-size: 1.4rem; color: var(--accent); white-space: nowrap; }

.search-container {
    flex: 1; max-width: 600px; position: relative;
}
.search-container input {
    width: 100%; background: var(--glass); border: 1px solid var(--border);
    padding: 0.7rem 1rem 0.7rem 2.5rem; border-radius: 30px; color: #fff; outline: none;
}
.search-container i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); }

/* === PRODUCT GRID === */
.container { padding: 8rem 5% 4rem; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }

.p-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
    padding: 1.5rem; position: relative; transition: 0.3s;
}
.p-card:hover { border-color: var(--accent); transform: translateY(-5px); }

.promo-badge {
    position: absolute; top: 1rem; right: 1rem; background: #EF4444; color: white;
    padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; font-weight: 800; z-index: 2;
}

.p-img { width: 100%; height: 200px; object-fit: contain; margin-bottom: 1rem; }
.rating { color: var(--accent); font-size: 0.8rem; margin-bottom: 0.5rem; }

.price-box { display: flex; align-items: center; gap: 10px; margin: 0.5rem 0; }
.old-price { text-decoration: line-through; color: var(--text-dim); font-size: 0.9rem; }
.current-price { color: var(--accent); font-size: 1.3rem; font-weight: 800; }

/* === PROGRESS MODAL (MCD SIMULATION) === */
.step-box { text-align: center; padding: 20px; }
.loader {
    width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--accent);
    border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
    margin-bottom: 15px;
}
@keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Reutilisation des styles overlays precedents */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2rem; width: 100%; max-width: 450px; }
.btn-gold { width: 100%; padding: 1rem; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<nav>
    <div class="logo">ELECTRO-GOLD</div>
    <div class="search-container">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Chercher un frigo, TV, Split..." onkeyup="filterProducts()">
    </div>
    <div style="display: flex; gap: 15px;">
        <i class="fa-regular fa-user" style="cursor:pointer" onclick="openAuth()"></i>
        <i class="fa-solid fa-cart-shopping" style="cursor:pointer"></i>
    </div>
</nav>

<div class="container">
    <h2 style="margin-bottom: 2rem; font-family: 'Clash Display'">Catalogue Électroménager</h2>
    <div class="product-grid" id="productGrid"></div>
</div>

<div class="overlay" id="processOverlay">
    <div class="modal-content">
        <div class="step-box" id="step1">
            <span class="loader"></span>
            <h3>Traitement du paiement...</h3>
            <p style="color:var(--text-dim)">Veuillez valider le message sur votre téléphone.</p>
        </div>
        <div class="step-box" id="step2" style="display:none;">
            <i class="fas fa-user-shield" style="font-size:3rem; color:var(--accent); margin-bottom:15px"></i>
            <h3>Vérification Administrative</h3>
            <p>Veuillez patienter pendant que l'administrateur approuve votre commande (MCD Table: COMMANDE)...</p>
        </div>
        <div class="step-box" id="step3" style="display:none;">
            <i class="fas fa-check-circle" style="font-size:3rem; color:#22C55E; margin-bottom:15px"></i>
            <h3 id="finalMsg">Commande Approuvée !</h3>
            <p id="subFinalMsg" style="font-size: 0.9rem; margin-top:10px"></p>
            <div id="qrPlaceholder" style="margin-top:20px; background:#fff; padding:10px; border-radius:10px; display:inline-block;"></div>
            <button class="btn-gold" style="margin-top:20px" onclick="location.reload()">TERMINER</button>
        </div>
    </div>
</div>

<script>
// DONNÉES PRODUITS (Inclus Promos & Notes selon MCD)
const products = [
    { id: 1, nom: "Smart TV LG 55' OLED", marque: "LG", prix: 650000, promo: 580000, note: 4.8, stock: 5, img: "https://images.unsplash.com/photo-1593359677879-a4bb92f829d1?q=80&w=400" },
    { id: 2, nom: "Réfrigérateur Américain BEKO", marque: "Beko", prix: 890000, promo: null, note: 4.5, stock: 3, img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=400" },
    { id: 3, nom: "Split Inverter 1.5 CV", marque: "Midea", prix: 285000, promo: 245000, note: 4.2, stock: 10, img: "https://images.unsplash.com/photo-1658213645070-50346387d833?q=80&w=400" },
    { id: 4, nom: "Machine à laver 9kg", marque: "Samsung", prix: 375000, promo: null, note: 4.7, stock: 6, img: "https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?q=80&w=400" }
];

function renderProducts(list = products) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = list.map(p => `
        <div class="p-card">
            ${p.promo ? `<div class="promo-badge">PROMO</div>` : ''}
            <img src="${p.img}" alt="${p.nom}" class="p-img">
            <div class="rating">
                ${Array(5).fill().map((_, i) => `<i class="fa${i < Math.floor(p.note) ? 's' : 'r'} fa-star"></i>`).join('')}
                <span style="color:var(--text-dim)">(${p.note})</span>
            </div>
            <h3 style="font-size:1.1rem">${p.nom}</h3>
            <div class="price-box">
                ${p.promo ? `<span class="old-price">${p.prix.toLocaleString()} F</span>` : ''}
                <span class="current-price">${(p.promo || p.prix).toLocaleString()} FCFA</span>
            </div>
            <button class="btn-gold" onclick="startCheckout(${p.id})">COMMANDER</button>
        </div>
    `).join('');
}

// BARRE DE RECHERCHE FONCTIONNELLE
function filterProducts() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = products.filter(p => 
        p.nom.toLowerCase().includes(term) || 
        p.marque.toLowerCase().includes(term)
    );
    renderProducts(filtered);
}

// SIMULATION DU FLUX MCD (Tunnel de commande)
async function startCheckout(productId) {
    const prod = products.find(p => p.id === productId);
    document.getElementById('processOverlay').style.display = 'flex';
    
    // Étape 1 : Simulation Paiement (3s)
    await new Promise(r => setTimeout(r, 2500));
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';

    // Étape 2 : Simulation Approbation Admin (MCD Logic) (5s)
    await new Promise(r => setTimeout(r, 5000));
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';

    // Étape 3 : Message de l'Administrateur & Ticket
    const ticketCode = "TKT-" + Math.floor(Math.random() * 900000 + 100000);
    document.getElementById('finalMsg').innerText = "Merci pour votre achat !";
    document.getElementById('subFinalMsg').innerHTML = `
        L'administrateur a validé votre commande.<br><br>
        <strong>Message de l'admin :</strong><br>
        "Nous allons vous assigner un livreur à votre adresse immédiatement. Merci de garder votre téléphone allumé."
    `;
    
    // Génération du QR Code pour le Ticket (MCD: Table TICKET)
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${ticketCode}&color=EAB308&bgcolor=0F0F0F`;
    document.getElementById('qrPlaceholder').innerHTML = `<img src="${qrUrl}" alt="Ticket QR"> <br> <small style="color:#000">${ticketCode}</small>`;
}

// Lancement initial
renderProducts();
</script>

</body>
</html>
