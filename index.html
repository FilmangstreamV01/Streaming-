<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELECTRO-PRO | E-Commerce Électroménager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<style>
:root {
    --primary: #FF6B00; 
    --bg-deep: #0a0a0a;
    --dark-2: #141414;
    --dark-3: #1f1f1f;
    --text-main: #FFFFFF;
    --text-dim: #888888;
    --border: rgba(255,255,255,0.08);
    --green: #00e676;
    --red: #ff3b3b;
    --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }

header {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); padding: 15px 20px;
    display: flex; justify-content: space-between; align-items: center;
}
.logo { font-family: 'Clash Display', sans-serif; font-size: 1.6rem; color: var(--primary); font-weight: 700; }

.hero { margin-top: 70px; padding: 40px 20px; text-align: center; }
.hero h1 { font-family: 'Clash Display', sans-serif; font-size: 2.4rem; margin-bottom: 15px; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }

.card {
    background: var(--dark-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px; transition: all 0.3s ease;
    cursor: pointer;
}
.card:hover { transform: translateY(-8px); border-color: var(--primary); }

.card-img { width: 100%; height: 200px; object-fit: contain; background: white; border-radius: 12px; padding: 10px; margin-bottom: 12px; }

.rating { display: flex; align-items: center; gap: 6px; margin: 8px 0; font-size: 0.95rem; }
.stars { color: #ffc107; }

.btn-add, .btn-primary {
    width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer;
    margin-top: 8px;
}
.btn-add { background: rgba(255,107,0,0.1); border: 1px solid var(--primary); color: var(--primary); }
.btn-primary { background: var(--primary); border: none; color: white; font-size: 1.1rem; padding: 18px; }

/* Modal */
.modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000;
    display: none; align-items: center; justify-content: center; padding: 15px;
}
.modal-content {
    background: var(--dark-3); width: 100%; max-width: 520px; border-radius: 20px; overflow: hidden;
}
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

/* Sidebar */
.sidebar {
    position: fixed; top: 0; right: -100%; width: 400px; max-width: 100%; height: 100vh;
    background: var(--dark-3); z-index: 2000; transition: 0.4s ease-in-out;
    display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
}
.sidebar.open { right: 0; }

/* Mobile */
@media (max-width: 480px) {
    .grid { grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 15px; }
    .card-img { height: 160px; }
    .btn-primary { padding: 20px; font-size: 1.2rem; }
}
</style>
</head>
<body>

<header>
    <div class="logo">ELECTRO-PRO</div>
    <div class="header-actions">
        <div class="cart-btn" onclick="toggleSidebar('cartSidebar')">
            <i class="fas fa-shopping-cart"></i>
            <div class="cart-badge" id="cartCount">0</div>
        </div>
        <div class="cart-btn" id="userBtn" onclick="toggleSidebar('authSidebar')">
            <i class="fas fa-user-circle"></i>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Votre Électroménager, <span style="color:var(--primary)">Livré Chez Vous.</span></h1>
    <p>Achetez en ligne, payez via Mobile Money et suivez votre livraison en temps réel.</p>
</section>

<div class="container">
    <h2 class="section-title"><i class="fas fa-bolt"></i> En vedette aujourd'hui</h2>
    <div class="grid" id="productGrid"></div>
</div>

<!-- MODAL DÉTAIL PRODUIT -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Produit</h3>
            <i class="fas fa-times" style="cursor:pointer;font-size:1.5rem" onclick="closeModal()"></i>
        </div>
        <div class="modal-body" id="modalBody" style="padding:20px; max-height:75vh; overflow-y:auto;"></div>
    </div>
</div>

<!-- Sidebars (auth + cart + checkout) -->
<div class="sidebar" id="authSidebar"> ... (ton code auth inchangé) ... </div>
<div class="sidebar" id="cartSidebar"> ... (ton code panier) ... </div>
<div class="sidebar" id="checkoutSidebar"> ... (ton code checkout) ... </div>

<div id="ticketOverlay"> ... (ton ticket) ... </div>

<script>
// ==================== CONFIG APPWRITE ====================
const { Client, Account, Databases, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('698f97e3001c4c48d6d7');
const account = new Account(client);

let currentUser = null;
let cart = [];

// ==================== PRODUITS AVEC NOTES ====================
const dbSimulation = [
    { id: 'p1', nom: 'Réfrigérateur No Frost 350L', marque: 'Samsung', prix: 285000, stock: 12, 
      img: 'https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?auto=format&fit=crop&q=80&w=400',
      rating: 4.7, reviews: 124,
      description: "Réfrigérateur moderne avec congélateur en bas. Technologie No Frost.",
      comments: [{name:"Aïcha K.", text:"Très bon produit, silencieux !", rating:5}] },

    { id: 'p2', nom: 'Machine à Laver 7kg Automatique', marque: 'LG', prix: 235000, stock: 15, 
      img: 'https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?auto=format&fit=crop&q=80&w=400',
      rating: 4.5, reviews: 89, description: "Machine intelligente avec moteur Inverter.", comments: [] },

    { id: 'p3', nom: 'Climatiseur Inverter 18000 BTU', marque: 'LG', prix: 450000, stock: 4, 
      img: 'https://cdn.pixabay.com/photo/2021/08/23/08/28/air-conditioner-6567113_960_720.jpg',
      rating: 4.8, reviews: 67, description: "Climatiseur économe et silencieux.", comments: [] }
];

function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = dbSimulation.map(p => `
        <div class="card" onclick="showProductDetail('${p.id}')">
            <div class="badge-stock \( {p.stock > 0 ? 'badge-ok' : 'badge-rupture'}"> \){p.stock > 0 ? 'EN STOCK' : 'RUPTURE'}</div>
            <img src="${p.img}" class="card-img">
            <div class="card-brand">${p.marque}</div>
            <div class="card-title">${p.nom}</div>
            
            <div class="rating">
                <span class="stars">${'★'.repeat(Math.floor(p.rating))}</span>
                <span>\( {p.rating} ( \){p.reviews})</span>
            </div>
            
            <div class="card-price">${p.prix.toLocaleString()} FCFA</div>
            <button class="btn-add" onclick="event.stopImmediatePropagation(); addToCart('\( {p.id}', ' \){p.nom}', \( {p.prix}, ' \){p.img}')">
                <i class="fas fa-cart-plus"></i> Ajouter
            </button>
        </div>
    `).join('');
}

// ==================== MODAL + AVIS ====================
let currentProduct = null;

function showProductDetail(id) {
    currentProduct = dbSimulation.find(p => p.id === id);
    if (!currentProduct) return;

    let html = `
        <img src="${currentProduct.img}" style="width:100%;border-radius:12px;margin-bottom:15px;">
        <p><strong>${currentProduct.marque}</strong> — ${currentProduct.description}</p>
        
        <div class="rating" style="font-size:1.2rem;margin:15px 0;">
            <span class="stars">${'★'.repeat(Math.floor(currentProduct.rating))}</span>
            <strong>\( {currentProduct.rating}</strong> ( \){currentProduct.reviews} avis)
        </div>

        <h4>Avis clients</h4>
    `;

    if (currentProduct.comments.length > 0) {
        html += currentProduct.comments.map(c => `
            <div style="background:#141414;padding:12px;border-radius:12px;margin-bottom:12px;">
                <strong>${c.name}</strong> — ${'★'.repeat(c.rating)}<br>
                <small>${c.text}</small>
            </div>
        `).join('');
    } else {
        html += `<p style="color:#888;">Aucun avis pour le moment.</p>`;
    }

    html += `
        <textarea id="userComment" rows="3" style="width:100%;background:#0a0a0a;border:1px solid #333;border-radius:8px;color:white;padding:12px;margin-top:15px;" placeholder="Donnez votre avis..."></textarea>
        <button class="btn-primary" onclick="submitReview()">Publier mon avis</button>
    `;

    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalTitle').textContent = currentProduct.nom;
    document.getElementById('productModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('productModal').style.display = 'none';
}

function submitReview() {
    const comment = document.getElementById('userComment').value.trim();
    if (!comment) return alert("Veuillez écrire un commentaire");

    currentProduct.comments.push({ name: "Vous", text: comment, rating: 5 });
    currentProduct.reviews++;
    currentProduct.rating = Math.round(((currentProduct.rating * (currentProduct.reviews-1)) + 5) / currentProduct.reviews * 10) / 10;

    alert("✅ Merci pour votre avis !");
    closeModal();
    renderProducts();
}

// ==================== PANIER (ton code original) ====================
function addToCart(id, nom, prix, img) {
    const existing = cart.find(item => item.id === id);
    if (existing) existing.qty++;
    else cart.push({ id, nom, prix, img, qty: 1 });
    updateCartUI();
}

function updateCartUI() {
    // ... (ton code existant pour le panier)
    const count = cart.reduce((a, b) => a + b.qty, 0);
    document.getElementById('cartCount').innerText = count;
    // Ajoute ici le reste de ton updateCartUI si besoin
}

function toggleSidebar(id) {
    document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('open'));
    if (id) document.getElementById(id).classList.add('open');
}

// Initialisation
window.onload = () => {
    renderProducts();
    // Ajoute ici ton checkUserSession() si tu veux
};
</script>

</body>
</html>
