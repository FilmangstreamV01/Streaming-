<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELECTRO-PRO | E-Commerce Électroménager</title>
    <meta name="description" content="Achetez votre électroménager en ligne. Livraison avec suivi GPS et paiement Mobile Money.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<style>
:root {
    --primary: #FF6B00; 
    --primary-dark: #cc5500;
    --bg-deep: #0a0a0a;
    --dark-2: #141414;
    --dark-3: #1f1f1f;
    --text-main: #FFFFFF;
    --text-dim: #888888;
    --border: rgba(255,255,255,0.08);
    --green: #00e676;
    --red: #ff3b3b;
    --yellow: #FFD700;
    --radius: 16px;
    --transition: all 0.3s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }

/* ===== HEADER ===== */
header {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); padding: 15px 20px;
    display: flex; justify-content: space-between; align-items: center;
}
.logo { font-family: 'Clash Display', sans-serif; font-size: 1.5rem; color: var(--primary); font-weight: 700; letter-spacing: 1px; }
.header-actions { display: flex; gap: 15px; align-items: center; }
.cart-btn { position: relative; cursor: pointer; font-size: 1.2rem; }
.cart-badge {
    position: absolute; top: -8px; right: -10px; background: var(--primary);
    color: white; font-size: 0.7rem; font-weight: bold; width: 18px; height: 18px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
}

/* ===== HERO ===== */
.hero {
    margin-top: 70px; padding: 40px 20px; text-align: center;
    background: linear-gradient(180deg, rgba(255,107,0,0.1) 0%, transparent 100%);
}
.hero h1 { font-family: 'Clash Display', sans-serif; font-size: 2.2rem; margin-bottom: 15px; }

/* ===== PRODUCT GRID ===== */
.container { max-width: 1200px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
.section-title { font-size: 1.3rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.card {
    background: var(--dark-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px; transition: var(--transition);
    position: relative;
}
.card-img { width: 100%; height: 180px; object-fit: contain; background: white; border-radius: 12px; margin-bottom: 15px; }

/* Étoiles et avis */
.rating { color: var(--yellow); font-size: 0.85rem; margin-bottom: 5px; }
.review-count { color: var(--text-dim); font-size: 0.75rem; margin-left: 5px; }

.card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; height: 2.4em; overflow: hidden; }
.card-price { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin-bottom: 15px; }

/* Bouton GROS et VISIBLE */
.btn-add {
    width: 100%; padding: 16px; background: var(--primary); border: none;
    color: white; border-radius: 12px; font-weight: 800; font-size: 1rem;
    cursor: pointer; transition: var(--transition); text-transform: uppercase;
}
.btn-add:active { transform: scale(0.95); }

/* ===== SIDEBARS ===== */
.sidebar {
    position: fixed; top: 0; right: -100%; width: 450px; max-width: 100%; height: 100vh;
    background: var(--dark-3); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column;
}
.sidebar.open { right: 0; }
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.sidebar-body { padding: 20px; flex: 1; overflow-y: auto; }

/* Footer du panier optimisé mobile */
.sidebar-footer { 
    padding: 20px; 
    border-top: 1px solid var(--border); 
    background: var(--dark-2);
    padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* Bouton de commande massif */
.btn-checkout {
    width: 100%; padding: 20px; background: var(--primary); border: none;
    color: white; border-radius: 14px; font-weight: 800; font-size: 1.2rem;
    cursor: pointer; box-shadow: 0 10px 20px rgba(255,107,0,0.3);
}

/* SECTION COMMENTAIRES */
.comment-box { background: var(--bg-deep); padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid var(--border); }
.comment-user { font-weight: bold; font-size: 0.9rem; color: var(--primary); margin-bottom: 5px; }
.comment-text { font-size: 0.85rem; color: var(--text-dim); }

/* Formulaire Styles */
.form-group { margin-bottom: 20px; }
.form-control {
    width: 100%; padding: 15px; background: var(--bg-deep); border: 1px solid var(--border);
    border-radius: 10px; color: white; font-size: 1rem;
}

.operator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.op-card { border: 1px solid var(--border); padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; }
.op-card.selected { border-color: var(--primary); background: rgba(255,107,0,0.15); font-weight: bold; }

/* TICKET STYLES */
#ticketOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000;
    display: none; align-items: center; justify-content: center; padding: 20px;
}
.ticket-card { background: white; color: black; padding: 30px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; }

@media (max-width: 768px) {
    .hero h1 { font-size: 1.8rem; }
    .sidebar { width: 100%; }
    .grid { grid-template-columns: 1fr; }
    .btn-add { padding: 18px; font-size: 1.1rem; } /* Encore plus gros sur mobile */
}
</style>
</head>
<body>

<header>
    <div class="logo">ELECTRO-PRO</div>
    <div class="header-actions">
        <div class="cart-btn" onclick="toggleSidebar('cartSidebar')">
            <i class="fas fa-shopping-cart"></i>
            <div class="cart-badge" id="cartCount">0</div>
        </div>
        <div class="cart-btn" id="userBtn" onclick="toggleSidebar('authSidebar')">
            <i class="fas fa-user-circle"></i>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Le Meilleur de l'Électro <br><span style="color:var(--primary)">Livré chez vous !</span></h1>
</section>

<div class="container">
    <h2 class="section-title"><i class="fas fa-fire"></i> Offres Spéciales</h2>
    <div class="grid" id="productGrid">
        </div>
</div>

<div class="sidebar" id="authSidebar">
    <div class="sidebar-header">
        <h3 id="authTitle">Mon Compte</h3>
        <i class="fas fa-times" style="cursor:pointer; font-size:1.5rem" onclick="toggleSidebar('')"></i>
    </div>
    <div class="sidebar-body">
        <div id="loggedOutUI">
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <button onclick="switchAuthMode('login')" style="flex:1; padding:10px; background:none; color:white; border:none; border-bottom:2px solid var(--primary)">Connexion</button>
                <button onclick="switchAuthMode('register')" style="flex:1; padding:10px; background:none; color:white; border:none;">Inscription</button>
            </div>
            <div class="form-group" id="nameGroup" style="display:none">
                <input type="text" id="authName" class="form-control" placeholder="Nom complet">
            </div>
            <div class="form-group">
                <input type="email" id="authEmail" class="form-control" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="authPassword" class="form-control" placeholder="Mot de passe">
            </div>
            <button class="btn-checkout" onclick="handleAuth()" id="authSubmit">SE CONNECTER</button>
        </div>
        <div id="loggedInUI" style="display:none; text-align:center;">
            <h2 id="userNameDisplay"></h2>
            <p id="userEmailDisplay" style="color:var(--text-dim); margin-bottom:30px"></p>
            <button class="btn-add" onclick="handleLogout()" style="background:var(--red)">DÉCONNEXION</button>
        </div>
    </div>
</div>

<div class="sidebar" id="cartSidebar">
    <div class="sidebar-header">
        <h3><i class="fas fa-shopping-basket"></i> Mon Panier</h3>
        <i class="fas fa-times" style="cursor:pointer; font-size:1.5rem" onclick="toggleSidebar('')"></i>
    </div>
    <div class="sidebar-body" id="cartBody"></div>
    <div class="sidebar-footer">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-size:1.2rem">Total :</span>
            <span id="cartTotal" style="font-size:1.5rem; font-weight:800; color:var(--primary)">0 FCFA</span>
        </div>
        <button class="btn-checkout" onclick="proceedToCheckout()">PASSER LA COMMANDE <i class="fas fa-chevron-right"></i></button>
    </div>
</div>

<div class="sidebar" id="checkoutSidebar">
    <div class="sidebar-header">
        <h3><i class="fas fa-map-marker-alt"></i> Livraison & Paiement</h3>
        <i class="fas fa-arrow-left" style="cursor:pointer" onclick="toggleSidebar('cartSidebar')"></i>
    </div>
    <div class="sidebar-body">
        <div class="form-group">
            <label style="display:block; margin-bottom:10px">Où livrer ? (GPS requis)</label>
            <button class="btn-add" style="background:#222; border:1px solid var(--green); color:var(--green)" onclick="getLocation()">
                <i class="fas fa-location-arrow"></i> MA POSITION ACTUELLE
            </button>
            <input type="text" id="gpsCoords" class="form-control" style="margin-top:10px" placeholder="Coordonnées GPS" readonly>
        </div>
        
        <div class="form-group">
            <label style="display:block; margin-bottom:10px">Mode de paiement Mobile Money</label>
            <div class="operator-grid">
                <div class="op-card selected" onclick="selectOp(this)">Orange</div>
                <div class="op-card" onclick="selectOp(this)">MTN MoMo</div>
                <div class="op-card" onclick="selectOp(this)">Wave</div>
                <div class="op-card" onclick="selectOp(this)">Moov</div>
            </div>
        </div>
        
        <div class="form-group">
            <input type="tel" id="momoNumber" class="form-control" placeholder="Numéro de téléphone">
        </div>
    </div>
    <div class="sidebar-footer">
        <button class="btn-checkout" onclick="processPayment()">CONFIRMER ET PAYER <span id="payAmount"></span></button>
    </div>
</div>

<div id="ticketOverlay">
    <div class="ticket-card">
        <h2 style="color:var(--primary)">ELECTRO-PRO</h2>
        <div style="border-top:2px dashed #ddd; margin:15px 0"></div>
        <p>Commande réussie !</p>
        <h3 id="ticketCode" style="margin:15px 0; letter-spacing:2px"></h3>
        <div id="qrContainer"><img id="qrImage" src="" style="width:150px"></div>
        <div style="border-top:2px dashed #ddd; margin:15px 0"></div>
        <button class="btn-add" onclick="document.getElementById('ticketOverlay').style.display='none'">TERMINER</button>
    </div>
</div>

<script>
// CONFIG
const { Client, Account, Databases, ID } = Appwrite;
const client = new Client().setEndpoint('https://cloud.appwrite.io/v1').setProject('698f97e3001c4c48d6d7');
const account = new Account(client);
const databases = new Databases(client);

let currentUser = null;
let cart = [];

// DATA SIMULÉE AVEC NOTES ET COMMENTAIRES
const dbProducts = [
    { 
        id: 'p1', 
        nom: 'Réfrigérateur Samsung No Frost', 
        prix: 285000, 
        img: 'https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?w=400', 
        note: 4.8, 
        avis: 24,
        coms: [{u: "Marc", t: "Refroidit super vite !"}, {u: "Awa", t: "Très silencieux."}]
    },
    { 
        id: 'p2', 
        nom: 'Machine à Laver LG 7kg', 
        prix: 235000, 
        img: 'https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?w=400', 
        note: 4.5, 
        avis: 18,
        coms: [{u: "Koffi", t: "Excellent rapport qualité prix."}]
    },
    { 
        id: 'p3', 
        nom: 'Split LG Inverter 1.5 CV', 
        prix: 450000, 
        img: 'https://cdn.pixabay.com/photo/2021/08/23/08/28/air-conditioner-6567113_960_720.jpg', 
        note: 4.9, 
        avis: 32,
        coms: [{u: "Jean", t: "Consomme très peu d'électricité."}]
    }
];

window.onload = () => {
    checkUserSession();
    renderProducts();
};

function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = dbProducts.map(p => `
        <div class="card">
            <img src="${p.img}" class="card-img">
            <div class="rating">
                ${Array(5).fill().map((_, i) => `<i class="${i < Math.floor(p.note) ? 'fas' : 'far'} fa-star"></i>`).join('')}
                <span class="review-count">(${p.avis} avis)</span>
            </div>
            <div class="card-title">${p.nom}</div>
            <div class="card-price">${p.prix.toLocaleString()} FCFA</div>
            
            <button class="btn-add" onclick="addToCart('${p.id}')">
                <i class="fas fa-cart-plus"></i> AJOUTER AU PANIER
            </button>

            <div style="margin-top:15px; border-top: 1px solid var(--border); padding-top:10px">
                <p style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase; margin-bottom:8px">Derniers avis :</p>
                ${p.coms.map(c => `
                    <div class="comment-box">
                        <div class="comment-user">${c.u}</div>
                        <div class="comment-text">"${c.t}"</div>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

function addToCart(id) {
    const p = dbProducts.find(x => x.id === id);
    const existing = cart.find(item => item.id === id);
    if (existing) existing.qty++; else cart.push({ ...p, qty: 1 });
    updateCartUI();
    // Feedback visuel rapide
    const btn = event.currentTarget;
    btn.innerHTML = "AJOUTÉ ! ✅";
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-cart-plus"></i> AJOUTER AU PANIER'; }, 1000);
}

function updateCartUI() {
    const body = document.getElementById('cartBody');
    const total = cart.reduce((sum, item) => sum + (item.prix * item.qty), 0);
    
    body.innerHTML = cart.map((item, idx) => `
        <div style="display:flex; gap:15px; background:var(--dark-2); padding:10px; border-radius:12px; margin-bottom:10px">
            <img src="${item.img}" style="width:60px; height:60px; object-fit:contain; border-radius:8px; background:white">
            <div style="flex:1">
                <div style="font-weight:600; font-size:0.9rem">${item.nom}</div>
                <div style="color:var(--primary); font-weight:700">${item.prix.toLocaleString()} FCFA</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px">
                    <span>Qté: ${item.qty}</span>
                    <i class="fas fa-trash" style="color:var(--red); cursor:pointer" onclick="removeFromCart(${idx})"></i>
                </div>
            </div>
        </div>
    `).join('') || '<p style="text-align:center; color:gray; margin-top:50px">Votre panier est vide.</p>';

    document.getElementById('cartTotal').innerText = total.toLocaleString() + ' FCFA';
    document.getElementById('payAmount').innerText = total.toLocaleString() + ' FCFA';
    document.getElementById('cartCount').innerText = cart.reduce((a, b) => a + b.qty, 0);
}

function removeFromCart(idx) {
    cart.splice(idx, 1);
    updateCartUI();
}

function toggleSidebar(id) {
    document.querySelectorAll('.sidebar').forEach(s => s.classList.remove('open'));
    if(id) document.getElementById(id).classList.add('open');
}

function selectOp(el) {
    document.querySelectorAll('.op-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
}

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(p => {
            document.getElementById('gpsCoords').value = p.coords.latitude.toFixed(6) + ", " + p.coords.longitude.toFixed(6);
        });
    }
}

async function processPayment() {
    if(!document.getElementById('gpsCoords').value || !document.getElementById('momoNumber').value) {
        return alert("Veuillez remplir les informations de livraison.");
    }
    const btn = document.querySelector('#checkoutSidebar .btn-checkout');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TRAITEMENT...';
    
    setTimeout(() => {
        const code = `EP-${Math.floor(10000 + Math.random() * 90000)}`;
        document.getElementById('ticketCode').innerText = code;
        document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?data=${code}&size=150x150&color=FF6B00`;
        document.getElementById('ticketOverlay').style.display = 'flex';
        cart = []; updateCartUI(); toggleSidebar('');
        btn.innerHTML = 'CONFIRMER ET PAYER';
    }, 2000);
}

// AUTH FUNCTIONS (APPWRITE)
async function checkUserSession() {
    try {
        currentUser = await account.get();
        document.getElementById('loggedInUI').style.display = 'block';
        document.getElementById('loggedOutUI').style.display = 'none';
        document.getElementById('userNameDisplay').innerText = "Salut, " + currentUser.name;
        document.getElementById('userEmailDisplay').innerText = currentUser.email;
    } catch (e) {
        document.getElementById('loggedInUI').style.display = 'none';
        document.getElementById('loggedOutUI').style.display = 'block';
    }
}

async function handleAuth() {
    const email = document.getElementById('authEmail').value;
    const pass = document.getElementById('authPassword').value;
    try {
        await account.createEmailPasswordSession(email, pass);
        location.reload();
    } catch (e) { alert("Erreur: " + e.message); }
}

async function handleLogout() {
    await account.deleteSession('current');
    location.reload();
}

function proceedToCheckout() {
    if(cart.length === 0) return alert("Panier vide !");
    toggleSidebar('checkoutSidebar');
}

function switchAuthMode(mode) {
    document.getElementById('nameGroup').style.display = (mode === 'register') ? 'block' : 'none';
    document.getElementById('authSubmit').innerText = (mode === 'register') ? 'CRÉER MON COMPTE' : 'SE CONNECTER';
}
</script>

</body>
    </html>
