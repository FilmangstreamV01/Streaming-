<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELECTRO-PRO | E-Commerce Électroménager</title>
    <meta name="description" content="Achetez votre électroménager en ligne. Livraison avec suivi GPS et paiement Mobile Money.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>

<style>
:root {
    --primary: #FF6B00; 
    --primary-dark: #cc5500;
    --bg-deep: #0a0a0a;
    --dark-2: #141414;
    --dark-3: #1f1f1f;
    --text-main: #FFFFFF;
    --text-dim: #888888;
    --border: rgba(255,255,255,0.08);
    --green: #00e676;
    --red: #ff3b3b;
    --radius: 16px;
    --transition: all 0.3s ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
body { background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; line-height: 1.6; }

/* ===== HEADER ===== */
header {
    position: fixed; top: 0; width: 100%; z-index: 1000;
    background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); padding: 15px 20px;
    display: flex; justify-content: space-between; align-items: center;
}
.logo { font-family: 'Clash Display', sans-serif; font-size: 1.5rem; color: var(--primary); font-weight: 700; letter-spacing: 1px; }

/* ===== HERO & GRID ===== */
.hero { margin-top: 70px; padding: 40px 20px; text-align: center; }
.hero h1 { font-family: 'Clash Display', sans-serif; font-size: 2.5rem; margin-bottom: 15px; }
.hero p { color: var(--text-dim); max-width: 600px; margin: 0 auto; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
    gap: 20px; 
}

/* Carte produit améliorée */
.card {
    background: var(--dark-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px; transition: var(--transition);
    position: relative; overflow: hidden; cursor: pointer;
}
.card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 35px rgba(255,107,0,0.2); }

.card-img { width: 100%; height: 200px; object-fit: contain; background: white; border-radius: 12px; padding: 10px; margin-bottom: 12px; }

.rating {
    display: flex; align-items: center; gap: 5px; font-size: 0.9rem; margin: 8px 0;
}
.stars { color: #ffc107; }
.rating span { color: var(--text-dim); font-size: 0.85rem; }

/* Bouton caisse plus visible sur mobile */
.btn-primary {
    width: 100%; padding: 18px; background: var(--primary); border: none;
    color: white; border-radius: 12px; font-weight: 700; font-size: 1.15rem; 
    cursor: pointer; margin-top: 10px;
    box-shadow: 0 4px 15px rgba(255,107,0,0.3);
}
.btn-primary:active { transform: scale(0.97); }

/* Modal Détail Produit */
.modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000;
    display: none; align-items: center; justify-content: center; padding: 15px;
}
.modal-content {
    background: var(--dark-3); max-width: 500px; width: 100%; border-radius: 20px;
    overflow: hidden;
}
.modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }

/* Reviews */
.review {
    background: var(--dark-2); padding: 12px; border-radius: 12px; margin-bottom: 12px;
}

/* Sidebar adjustments */
.sidebar {
    position: fixed; top: 0; right: -100%; width: 400px; max-width: 100%; height: 100vh;
    background: var(--dark-3); z-index: 2000; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
    transition: 0.4s ease-in-out; display: flex; flex-direction: column;
}
.sidebar.open { right: 0; }

/* Mobile Optimisation */
@media (max-width: 480px) {
    .btn-primary { padding: 20px; font-size: 1.2rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
    .card-img { height: 160px; }
}
</style>
</head>
<body>

<header>
    <div class="logo">ELECTRO-PRO</div>
    <div class="header-actions">
        <div class="cart-btn" onclick="toggleSidebar('cartSidebar')">
            <i class="fas fa-shopping-cart"></i>
            <div class="cart-badge" id="cartCount">0</div>
        </div>
        <div class="cart-btn" id="userBtn" onclick="toggleSidebar('authSidebar')">
            <i class="fas fa-user-circle"></i>
        </div>
    </div>
</header>

<section class="hero">
    <h1>Votre Électroménager, <span style="color:var(--primary)">Livré Chez Vous.</span></h1>
    <p>Achetez en ligne, payez via Mobile Money en toute sécurité, et suivez votre livraison en temps réel.</p>
</section>

<div class="container">
    <h2 class="section-title"><i class="fas fa-bolt"></i> En vedette aujourd'hui</h2>
    <div class="grid" id="productGrid"></div>
</div>

<!-- === MODAL DÉTAIL PRODUIT === -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle"></h3>
            <i class="fas fa-times" style="cursor:pointer; font-size:1.4rem" onclick="closeModal()"></i>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- Sidebars (auth, cart, checkout) restent identiques -->
<!-- ... (je garde tes sidebars telles quelles pour ne pas alourdir) ... -->

<script>
// ==================== DONNÉES PRODUITS AVEC NOTES ====================
const dbSimulation = [
    { 
        id: 'p1', cat: 'Réfrigérateurs', nom: 'Réfrigérateur No Frost 350L', marque: 'Samsung', 
        prix: 285000, stock: 12, img: 'https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?auto=format&fit=crop&q=80&w=400',
        rating: 4.7, reviews: 124,
        description: "Réfrigérateur moderne avec congélateur en bas. Technologie No Frost.",
        comments: [
            {name: "Aïcha K.", text: "Très bon produit, silencieux et grande capacité !", rating: 5},
            {name: "Moussa D.", text: "Livraison rapide et bien emballé.", rating: 4}
        ]
    },
    { 
        id: 'p2', cat: 'Machines à Laver', nom: 'Machine à Laver 7kg Automatique', marque: 'LG', 
        prix: 235000, stock: 15, img: 'https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?auto=format&fit=crop&q=80&w=400',
        rating: 4.5, reviews: 89,
        description: "Machine à laver intelligente avec 10 programmes et moteur Inverter.",
        comments: []
    },
    { 
        id: 'p3', cat: 'Climatiseurs', nom: 'Climatiseur Inverter 18000 BTU', marque: 'LG', 
        prix: 450000, stock: 4, img: 'https://cdn.pixabay.com/photo/2021/08/23/08/28/air-conditioner-6567113_960_720.jpg',
        rating: 4.8, reviews: 67,
        description: "Climatiseur économe en énergie avec mode silencieux.",
        comments: [{name: "Fatou S.", text: "Refroidit très vite !", rating: 5}]
    },
    { 
        id: 'p4', cat: 'Petit Électroménager', nom: 'Mixeur Blender 1.5L 600W', marque: 'Philips', 
        prix: 35000, stock: 50, img: 'https://images.unsplash.com/photo-1585515320310-259814833e62?auto=format&fit=crop&q=80&w=400',
        rating: 4.3, reviews: 203,
        description: "Mixeur puissant pour vos jus et soupes.",
        comments: []
    }
];

let currentProduct = null;

// Render products avec notes
function renderProducts(products) {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = products.map(p => `
        <div class="card" onclick="showProductDetail('${p.id}')">
            <div class="badge-stock \( {p.stock > 0 ? 'badge-ok' : 'badge-rupture'}"> \){p.stock > 0 ? 'EN STOCK' : 'RUPTURE'}</div>
            <img src="${p.img}" class="card-img">
            <div class="card-brand">${p.marque}</div>
            <div class="card-title">${p.nom}</div>
            
            <div class="rating">
                <span class="stars">${'★'.repeat(Math.floor(p.rating))}</span>
                <span>\( {p.rating} ( \){p.reviews})</span>
            </div>
            
            <div class="card-price">${p.prix.toLocaleString()} FCFA</div>
            <button class="btn-add" onclick="event.stopImmediatePropagation(); addToCart('\( {p.id}', ' \){p.nom}', \( {p.prix}, ' \){p.img}')">
                <i class="fas fa-cart-plus"></i> Ajouter
            </button>
        </div>
    `).join('');
}

// Modal détail produit
function showProductDetail(id) {
    currentProduct = dbSimulation.find(p => p.id === id);
    if (!currentProduct) return;

    document.getElementById('modalTitle').textContent = currentProduct.nom;

    let html = `
        <img src="${currentProduct.img}" style="width:100%; border-radius:12px; margin-bottom:15px;">
        <p><strong>${currentProduct.marque}</strong> — ${currentProduct.description}</p>
        
        <div class="rating" style="font-size:1.1rem; margin:15px 0;">
            <span class="stars">${'★'.repeat(Math.floor(currentProduct.rating))}</span>
            <strong>\( {currentProduct.rating}</strong> ( \){currentProduct.reviews} avis)
        </div>

        <h4>Avis clients</h4>
    `;

    if (currentProduct.comments.length > 0) {
        html += currentProduct.comments.map(c => `
            <div class="review">
                <strong>${c.name}</strong> — ${'★'.repeat(c.rating)}
                <p>${c.text}</p>
            </div>
        `).join('');
    } else {
        html += `<p style="color:var(--text-dim); font-style:italic;">Soyez le premier à donner votre avis !</p>`;
    }

    // Formulaire avis
    html += `
        <h4 style="margin-top:20px;">Laisser un avis</h4>
        <textarea id="commentText" rows="3" class="form-control" placeholder="Votre commentaire..."></textarea>
        <button class="btn-primary" onclick="submitReview()" style="margin-top:10px; padding:14px;">Publier mon avis</button>
    `;

    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('productModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('productModal').style.display = 'none';
}

function submitReview() {
    const text = document.getElementById('commentText').value.trim();
    if (!text || !currentProduct) return alert("Veuillez écrire un commentaire.");

    currentProduct.comments.push({
        name: currentUser ? currentUser.name.split(' ')[0] + "." : "Client",
        text: text,
        rating: 5
    });
    currentProduct.reviews++;
    currentProduct.rating = ((currentProduct.rating * (currentProduct.reviews-1)) + 5) / currentProduct.reviews;

    alert("Merci pour votre avis !");
    closeModal();
    renderProducts(dbSimulation); // rafraîchir les étoiles
}

    checkUserSession();
    renderProducts(dbSimulation);
};

// ... (ton code existant : checkUserSession, addToCart, etc.)
</script>

</body>
</html>
